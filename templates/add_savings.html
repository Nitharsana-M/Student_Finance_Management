{% extends 'base.html' %}

{% block content %}
<div style="max-width:520px; margin:0 auto;">
    <div class="section-header mb-3">
        <h2 class="page-title">
            {% if is_withdraw %}➖ <span>Withdraw from</span>{% else %}➕ <span>Add Savings to</span>{% endif %}
            {{ goal.title }}
        </h2>
        <a href="{% url 'dashboard' %}" class="btn-sm-custom btn-edit"
            style="text-decoration:none;padding:0.45rem 0.9rem;">
            ← Back
        </a>
    </div>
    <div class="card-panel">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Amount (₹)</label>
                <input type="number" step="0.01" name="amount" class="form-control" required placeholder="0.00">
            </div>
            <button type="submit" class="btn-primary-custom w-100">
                {% if is_withdraw %}Withdraw{% else %}Add Savings{% endif %}
            </button>
        </form>
    </div>
</div>
{% endblock %}
