<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Sign In — Smart Finance Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Sign in to your Smart Student Finance Tracker account.">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --accent: #6366f1;
            --navy: #0f172a;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-wrap {
            width: 100%;
            max-width: 420px;
            padding: 1.5rem;
        }

        .login-card {
            background: #fff;
            border-radius: 24px;
            padding: 2.5rem 2rem;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.4);
        }

        .brand {
            text-align: center;
            margin-bottom: 2rem;
        }

        .brand .icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--accent), #818cf8);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin: 0 auto 0.75rem;
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.35);
        }

        .brand h1 {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--navy);
            margin: 0;
        }

        .brand p {
            font-size: 0.85rem;
            color: #64748b;
            margin: 0.25rem 0 0;
        }

        .form-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #475569;
        }

        .form-control {
            border-radius: 10px;
            border: 1.5px solid #e2e8f0;
            padding: 0.6rem 0.9rem;
            font-size: 0.9rem;
            transition: border-color 0.18s, box-shadow 0.18s;
        }

        .form-control:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        .btn-login {
            background: linear-gradient(135deg, var(--accent), #818cf8);
            border: none;
            border-radius: 10px;
            color: #fff;
            padding: 0.7rem;
            font-size: 0.95rem;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            transition: opacity 0.18s, transform 0.1s;
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.35);
            margin-top: 0.5rem;
        }

        .btn-login:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border-radius: 10px;
            padding: 0.65rem 0.9rem;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .input-group-custom {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 0.85rem;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            pointer-events: none;
        }

        .input-group-custom .form-control {
            padding-left: 2.4rem;
        }
    </style>
</head>

<body>
    <div class="login-wrap">
        <div class="login-card">
            <div class="brand">
                <div class="icon">💰</div>
                <h1>Smart Finance Tracker</h1>
                <p>Student finance management</p>
            </div>

            {% if error %}
            <div class="alert-error">
                <i class="bi bi-exclamation-triangle-fill"></i> {{ error }}
            </div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label" for="username">Username</label>
                    <div class="input-group-custom">
                        <i class="bi bi-person input-icon"></i>
                        <input type="text" id="username" name="username" class="form-control"
                            placeholder="Enter username" autocomplete="username" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label" for="password">Password</label>
                    <div class="input-group-custom">
                        <i class="bi bi-lock input-icon"></i>
                        <input type="password" id="password" name="password" class="form-control"
                            placeholder="Enter password" autocomplete="current-password" required>
                    </div>
                </div>
                <button type="submit" class="btn-login">Sign In <i class="bi bi-arrow-right-short"></i></button>
            </form>
        </div>
    </div>
</body>

</html>
