{% extends 'base.html' %}
{% block content %}
<!-- ══════════════════════════════════════════════════════════════
   TRANSACTIONS PAGE
══════════════════════════════════════════════════════════════ -->
<div class="page-section active" id="section-transactions">
    <div class="section-header">
        <h2 class="page-title">All <span>Transactions</span></h2>
        <button class="btn-primary-custom" onclick="openModal('addTransactionModal')">
            <i class="bi bi-plus-lg me-1"></i> Add Transaction
        </button>
    </div>

    <div class="card-panel">
        <div class="table-responsive-custom">
            <table class="table-custom">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Category</th>
                        <th class="text-end">Amount</th>
                        <th class="text-end">Actions</th>
                    </tr>
                </thead>
                <tbody id="fullTransactionsList">
                    <tr>
                        <td colspan="4">
                            <div class="spinner-custom"></div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- ══════════════════════════════════════════════════════════════
   MODAL (Edit Tx locally to this page)
══════════════════════════════════════════════════════════════ -->
<div class="modal-overlay" id="editTransactionModal">
    <div class="modal-box">
        <button class="modal-close" onclick="closeModal('editTransactionModal')">✕</button>
        <h4><i class="bi bi-pencil-square me-2" style="color:var(--accent);"></i>Edit Transaction</h4>
        <form id="editTxForm">
            <input type="hidden" id="editTxPk">
            <div class="mb-3">
                <label class="form-label">Category</label>
                <select name="category" class="form-select" required id="editTxCategory"></select>
            </div>
            <div class="mb-3">
                <label class="form-label">Amount (₹)</label>
                <input type="number" name="amount" class="form-control" id="editTxAmount" step="0.01" min="0.01"
                    required>
            </div>
            <div class="mb-3">
                <label class="form-label">Date</label>
                <input type="date" name="date" class="form-control" id="editTxDate" required>
            </div>
            <button type="submit" class="btn-primary-custom w-100">Update Transaction</button>
        </form>
    </div>
</div>

<script>
    const API = {
        transactions: '{% url "api_transactions" %}',
        editTx: (pk) => `/edit/${pk}/`,
        deleteTx: (pk) => `/delete-ajax/${pk}/`
    };

    const fmt = n => '₹ ' + parseFloat(n).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

    function loadTransactions() {
        fetch(API.transactions, { headers: { 'X-Requested-With': 'XMLHttpRequest' } })
            .then(r => r.json())
            .then(d => {
                const tbody = document.getElementById('fullTransactionsList');
                if (!d.transactions || !d.transactions.length) {
                    tbody.innerHTML = '<tr><td colspan="4" class="no-data">No transactions found.</td></tr>';
                    return;
                }
                tbody.innerHTML = d.transactions.map(t => {
                    const isIncome = t.category_type === 'income';
                    return `
                    <tr>
                        <td style="color:#64748b; font-size:0.85rem;">${t.date}</td>
                        <td><span class="badge-${isIncome ? 'income' : 'expense'}">${t.category}</span></td>
                        <td class="text-end fw-bold" style="color:${isIncome ? '#16a34a' : '#dc2626'}">${fmt(t.amount)}</td>
                        <td class="text-end">
                            <button class="btn-sm-custom btn-edit me-1" onclick="openEditModal(${t.id}, '${escHtml(t.category)}', ${t.amount}, '${t.date}')"><i class="bi bi-pencil-fill"></i></button>
                            <button class="btn-sm-custom btn-delete" onclick="deleteTx(${t.id})"><i class="bi bi-trash-fill"></i></button>
                        </td>
                    </tr>`;
                }).join('');
            });
    }

    function escHtml(s) { return s.replace(/['"]/g, ''); }

    function openEditModal(pk, category, amount, date) {
        document.getElementById('editTxPk').value = pk;
        document.getElementById('editTxAmount').value = amount;
        document.getElementById('editTxDate').value = date;

        const sel = document.getElementById('editTxCategory');
        sel.innerHTML = window.globalCategoryCache.map(c =>
            `<option value="${c.id}" ${c.name === category ? 'selected' : ''}>${c.name}</option>`
        ).join('');

        openModal('editTransactionModal');
    }

    function deleteTx(pk) {
        if (!confirm('Are you sure you want to delete this transaction?')) return;

        let formData = new FormData();
        formData.append('csrfmiddlewaretoken', getCookie('csrftoken'));

        fetch(API.deleteTx(pk), {
            method: 'POST',
            body: formData,
            headers: { 'X-Requested-With': 'XMLHttpRequest' }
        })
            .then(r => {
                if (r.ok) {
                    showToast('Transaction deleted.', 'success');
                    loadTransactions();
                } else showToast('Failed to delete transaction.', 'error');
            })
            .catch(() => showToast('Network error.', 'error'));
    }

    document.getElementById('editTxForm').addEventListener('submit', function (e) {
        e.preventDefault();
        const pk = document.getElementById('editTxPk').value;
        const fd = new FormData(this);
        ajaxPost(API.editTx(pk), fd, 'Transaction updated!', () => {
            closeModal('editTransactionModal');
            loadTransactions();
        });
    });

    window.reloadAll = loadTransactions;
    document.addEventListener('DOMContentLoaded', loadTransactions);
</script>
{% endblock %}
