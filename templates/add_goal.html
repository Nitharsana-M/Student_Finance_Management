{% extends 'base.html' %}

{% block content %}
<div style="max-width:520px; margin:0 auto;">
    <div class="section-header mb-3">
        <h2 class="page-title">🎯 <span>New Savings Goal</span></h2>
        <a href="{% url 'dashboard' %}" class="btn-sm-custom btn-edit"
            style="text-decoration:none;padding:0.45rem 0.9rem;">
            ← Back
        </a>
    </div>
    <div class="card-panel">
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-primary-custom w-100 mt-2">Create Goal</button>
        </form>
    </div>
</div>
{% endblock %}
